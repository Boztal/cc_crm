{% extends 'base.html' %}

{% block content %}

<div class="form-wrapper">
    <div class="form-card">

        <h2>Редактирование операции</h2>

        <form method="POST" action="/update">

            <input type="hidden" name="id_oper" value="{{ op.id }}">

            <div class="group">
                <label>Сумма</label>
                <input type="number" step="0.01" name="amount" value="{{ op.amount}}" required>
            </div>

            <div class="group">
                <label>Тип операции</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="op_type" value="income"
                        {% if op.op_type == 'income' %} checked {% endif %}>
                        Доход
                    </label>

                    <label>
                        <input type="radio" name="op_type" value="expense"
                        {% if op.op_type == 'expense' %} checked {% endif %}>
                        Расход
                    </label>
                </div>
            </div>

            <div class="group">
                <label>Дата</label>
                <input type="date" name="date" value="{{ op.date }}">
            </div>

            <div class="group">
                <label>Описание</label>
                <input type="text" name="description" value="{{ op.description }}" required>
            </div>

            <div class="btn-row">
                <button type="submit" class="primary">Сохранить</button>
                <button type="button" class="secondary" onclick="window.history.back();">Отмена</button>
            </div>

        </form>

    </div>
</div>

<style>
.form-wrapper {
    display: flex;
    justify-content: center;
    padding: 20px 0;
}

.form-card {
    width: 420px;
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 10px;
    padding: 20px;
}

h2 {
    font-size: 18px;
    text-align: center;
    margin-bottom: 15px;
}

.group {
    margin-bottom: 12px;
}

label {
    display: block;
    font-size: 13px;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

.radio-group {
    display: flex;
    gap: 15px;
    font-size: 14px;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
}

.btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    font-size: 14px;
}

.primary {
    background: #1f1f1f;
    color: white;
}

.primary:hover {
    background: #000;
}

.secondary {
    background: #eaeaea;
    color: #333;
}

.secondary:hover {
    background: #ddd;
}
</style>

{% endblock %}
