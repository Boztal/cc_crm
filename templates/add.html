{% extends 'base.html' %}

{% block content %}

<div class="form-wrapper">
    <div class="form-card">

        <h2>Новая операция</h2>

        <form method="POST" action="/add">

            <div class="group">
                <label>Сумма</label>
                <input type="number" step="0.01" name="amount" placeholder="0.00" required>
            </div>

            <div class="group">
                <label>Тип операции</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="op_type" value="income" required>
                        Доход
                    </label>

                    <label>
                        <input type="radio" name="op_type" value="expense" required>
                        Расход
                    </label>
                </div>
            </div>

            <div class="group">
                <label>Дата</label>
                <input type="date" name="date">
            </div>

            <div class="group">
                <label>Описание</label>
                <input type="text" name="description" placeholder="Например: оплата связи" required>
            </div>

         

            <button type="submit">Сохранить</button>

        </form>

    </div>
</div>

<style>
.form-wrapper {
    display: flex;
    justify-content: center;
    padding: 20px 0;
}

.form-card {
    width: 420px;
    background: #fff;
    border: 1px solid #e6e6e6;
    border-radius: 10px;
    padding: 20px;
}

.form-card h2 {
    font-size: 18px;
    margin-bottom: 15px;
    text-align: center;
}

.group {
    margin-bottom: 12px;
}

.group label {
    display: block;
    font-size: 13px;
    margin-bottom: 5px;
    color: #333;
}

.form-card input,
.form-card select {
    width: 100%;
    padding: 10px;

    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

.radio-group {
    display: flex;
    gap: 15px;
    font-size: 14px;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #1f1f1f;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 10px;
}

button:hover {
    background: #000;
}
</style>

{% endblock %}
